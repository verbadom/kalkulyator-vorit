<!DOCTYPE html>
<html lang="uk" data-theme="light" spellcheck="false">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Розпашні ворота — розрахунок вартості онлайн | Verbadom</title>
  <meta name="description" content="Розрахуйте вартість розпашних воріт з доставкою по Україні. Ковані та сучасні ворота з хвірткою. Безкоштовний онлайн-калькулятор." />
  <meta name="keywords" content="розпашні ворота ціна, ковані ворота купити, сучасні ворота, ворота з хвірткою, калькулятор воріт онлайн, ворота доставка Україна" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://verbadom.github.io/kalkulyator-vorit/" />
  <meta property="og:title" content="Розпашні ворота — розрахунок вартості онлайн | Verbadom" />
  <meta property="og:description" content="Розрахуйте вартість розпашних воріт з доставкою по Україні. Ковані та сучасні ворота з хвірткою." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://verbadom.github.io/kalkulyator-vorit/" />
  <meta property="og:locale" content="uk_UA" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Калькулятор розпашних воріт",
    "description": "Безкоштовний онлайн-калькулятор вартості розпашних воріт з доставкою по Україні. Ковані та сучасні ворота з хвірткою або без.",
    "url": "https://verbadom.github.io/kalkulyator-vorit/",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "All",
    "inLanguage": "uk-UA",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "UAH", "description": "Безкоштовний розрахунок" },
    "provider": { "@type": "Organization", "name": "Verbadom", "url": "https://verbadom.com.ua", "telephone": "+380673990560", "address": { "@type": "PostalAddress", "addressLocality": "Одеса", "addressCountry": "UA" } }
  }
  </script>
  <link rel="stylesheet" href="style.css" />
  <style>
    #city-dropdown { display:none; position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid #c8d0e0; border-top:none; border-radius:0 0 8px 8px; box-shadow:0 6px 20px rgba(0,0,0,0.12); z-index:1000; max-height:220px; overflow-y:auto; }
    .city-option { padding:11px 14px; cursor:pointer; font-size:14px; color:#222; border-bottom:1px solid #f0f0f0; line-height:1.3; }
    .city-option:hover, .city-option.active { background:#eef3ff; }
    .city-option:last-child { border-bottom:none; }
    .city-option-main { font-weight:500; }
    .city-option-sub { font-size:12px; color:#888; margin-top:1px; }
    #city.has-selection { border-color:#4caf50; }
    .width-hint { display:none; margin-top:8px; padding:8px 12px; background:#fff8e1; border-left:3px solid #f0a030; border-radius:6px; font-size:13px; color:#7a5800; line-height:1.5; }
    .width-schema { margin-top:10px; }
    .width-schema svg { width:100%; height:auto; }
    .delivery-note-inline { font-size:13px; color:#444; margin:4px 0 8px; padding-left:2px; }
  </style>
</head>
<body>
<div class="calculator">
  <div class="calc-header">
    <div>
      <h1>Калькулятор воріт</h1>
      <p class="subtitle">Розрахуйте вартість воріт з доставкою по Україні</p>
    </div>
  </div>

  <div class="field">
    <label for="gateType">Тип воріт</label>
    <select id="gateType" style="color-scheme:light" spellcheck="false">
      <option value="">— Оберіть тип —</option>
      <option value="forged">Ковані</option>
      <option value="modern">Сучасні</option>
    </select>
  </div>

  <div class="field">
    <label for="gateModel">Модель</label>
    <select id="gateModel" style="color-scheme:light" disabled spellcheck="false">
      <option value="">— Спочатку оберіть тип —</option>
    </select>
    <img id="modelPhoto" src="" alt="" style="display:none; margin-top:12px; width:100%; height:auto; border-radius:10px;" />
    <div id="includedBlock" class="included-block" style="display:none"></div>
  </div>

  <div class="field">
    <label for="configuration">Варіант комплектації</label>
    <select id="configuration" style="color-scheme:light" spellcheck="false">
      <option value="">— Оберіть комплектацію —</option>
      <option value="with_separate_wicket">Брама + хвіртка окремо</option>
      <option value="without_wicket">Брама без хвіртки</option>
      <option value="with_builtin_wicket">Брама з хвірткою всередині (врізна)</option>
    </select>
  </div>

  <div class="field">
    <label for="width">Ширина комплекту (м)</label>
    <p class="field-note-top">Вкажіть відстань між крайніми стовпами комплекту</p>
    <input type="text" id="width" placeholder="наприклад: 4,52" inputmode="decimal" />
    <p class="field-note">Від 2,5 м до 6 м.</p>
    <div class="width-hint" id="widthHint"></div>
    <div class="width-schema">
      <svg viewBox="0 0 400 130" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrowR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </marker>
          <marker id="arrowL" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M8 1L2 5L8 9" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </marker>
        </defs>
        <line x1="40" y1="105" x2="360" y2="105" stroke="#bbb" stroke-width="1.5"/>
        <rect x="55" y="35" width="22" height="70" rx="3" fill="none" stroke="#555" stroke-width="1.5"/>
        <rect x="189" y="35" width="22" height="70" rx="3" fill="none" stroke="#555" stroke-width="1.5"/>
        <rect x="323" y="35" width="22" height="70" rx="3" fill="none" stroke="#555" stroke-width="1.5"/>
        <line x1="80" y1="62" x2="320" y2="62" stroke="#c0392b" stroke-width="1.8" marker-start="url(#arrowL)" marker-end="url(#arrowR)"/>
        <rect x="148" y="48" width="104" height="20" rx="3" fill="#fff8e1"/>
        <text x="200" y="62" text-anchor="middle" dominant-baseline="central" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#c0392b">Ширина комплекту</text>
        <text x="66" y="24" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#888">стовп</text>
        <text x="200" y="24" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#888">стовп</text>
        <text x="334" y="24" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#888">стовп</text>
        <text x="200" y="122" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#888">між внутрішніми сторонами крайніх стовпів</text>
      </svg>
    </div>
    <div class="height-notice">ℹ️ Висота воріт до 2,1 м — не впливає на ціну</div>
  </div>

  <div class="field">
    <label for="coating">Тип покриття</label>
    <select id="coating" style="color-scheme:light" spellcheck="false">
      <option value="" disabled selected>— Оберіть тип покриття —</option>
      <option value="0">Глянець 0,3 мм (базовий варіант)</option>
    </select>
    <p id="coatingNote" class="field-note"></p>
  </div>

  <div class="field" id="lockField" style="display:none">
    <label class="checkbox-label">
      <input type="checkbox" id="lock" />
      <span>Замок у хвіртку з встановленням (+1 500 грн)<span class="note">тільки для кованих воріт</span></span>
    </label>
  </div>

  <div class="field">
    <label class="checkbox-label">
      <input type="checkbox" id="bolts" />
      <span>Засуви на створки воріт, 2 шт (+600 грн)<span class="note">Утримують створки від руху вітру</span></span>
    </label>
  </div>

  <div class="field">
    <label for="post">Стовпи (необов'язково)</label>
    <select id="post" style="color-scheme:light" spellcheck="false">
      <option value="none">Без стовпів</option>
      <option value="775">Нефарбований 80×60, стінка 2мм / висота 3м</option>
      <option value="1120">Нефарбований 80×80, стінка 3мм / висота 3м</option>
      <option value="750">Фарбований 60×60, стінка 2мм / висота 2м</option>
      <option value="1240">Фарбований 80×80, стінка 3мм / висота 2м</option>
      <option value="950">Фарбований 60×60, стінка 2мм / висота 2,4м</option>
      <option value="1560">Фарбований 80×80, стінка 3мм / висота 2,4м</option>
    </select>
    <p class="field-note">⚠️ Стовпи доставляються лише машиною заводу</p>
  </div>

  <div class="field" id="postQtyField" style="display:none">
    <label for="postQty">Кількість стовпів</label>
    <input type="number" id="postQty" value="2" min="1" max="10" />
  </div>

  <div class="field">
    <label for="city">Населений пункт доставки</label>
    <div style="position:relative;">
      <input type="text" id="city" autocomplete="off" placeholder="Введіть назву міста або села..." />
      <div id="city-dropdown"></div>
    </div>
    <p class="field-note">Вводьте тільки назву населеного пункту — оберіть зі списку підказок</p>
  </div>

  <button id="calculateBtn">Розрахувати вартість</button>
  <div id="result" class="result hidden"></div>
  <button id="resetBtn" class="btn-reset" style="display:none">🔄 Почати новий розрахунок</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="app.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD2N2N_0D0GVhjQ5t0zwc9TXxJwsfl8OGM&libraries=places&language=uk&v=weekly&callback=initGoogleAutocomplete"></script>
</body>
</html>
